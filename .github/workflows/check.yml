  test-windows:
    name: Test Windows (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - name: Debug spawn test
        run: uv run pytest tests/test_debug_windows_spawn.py -v -s
      - name: Minimal file-open test
        if: always()
        run: uv run pytest tests/app/test_app.py::test_app_opens_initial_file_on_start -v -s --reruns 3

