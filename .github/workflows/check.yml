name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: >-
    check-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.sha
    }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo skip
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - run: echo skip
  language-check:
    name: Language Check
    runs-on: ubuntu-latest
    steps:
      - run: echo skip
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - run: echo skip

  test-windows:
    name: Test Windows (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: uv run pytest tests/ -n auto -m "not serial" --reruns 3 -v

  test-snapshot:
    name: Snapshot Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - run: echo skip
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - run: echo skip
