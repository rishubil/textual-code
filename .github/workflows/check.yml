name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: >-
    check-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.sha
    }}
  cancel-in-progress: true

